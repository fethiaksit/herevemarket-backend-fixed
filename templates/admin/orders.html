<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hereve Market Admin - Siparişler</title>
  <link rel="stylesheet" href="/public/admin/admin.css">
  <link rel="stylesheet" href="/public/admin/orders.css">
</head>
<body>
<header>
  <div class="header-content">
    <h1>Hereve Market – Admin Panel</h1>
    <nav>
      <a href="/admin/categories">Kategoriler</a>
      <a href="/admin/products">Ürünler</a>
      <a class="active" href="/admin/orders">Siparişler</a>
      <button type="button" id="logoutButton">Çıkış</button>
    </nav>
  </div>
</header>
<main>
  <section class="hm-admin">
    <h2 class="page-title">Siparişler</h2>

    <div class="hm-card">
      <div class="hm-toolbar">
        <div class="hm-filters">
          <label>
            Durum
            <select id="statusFilter">
              <option value="">Tümü</option>
              <option value="pending">Beklemede</option>
              <option value="approved">Onaylandı</option>
              <option value="cancelled">İptal Edildi</option>
              <option value="delivered">Teslim Edildi</option>
            </select>
          </label>

          <label>
            Ödeme
            <select id="paymentFilter">
              <option value="">Tümü</option>
              <option value="cash">Nakit</option>
              <option value="card">Kart</option>
            </select>
          </label>

          <label>
            Arama (telefon / sipariş kodu)
            <input type="text" id="searchFilter" placeholder="05xx... veya sipariş kodu">
          </label>

          <label>
            Limit
            <select id="limitFilter">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </label>
        </div>

        <div class="hm-actions">
          <button type="button" id="applyFiltersButton" class="small">Filtrele</button>
          <button type="button" id="clearFiltersButton" class="small ghost">Temizle</button>
          <button type="button" id="refreshOrdersButton" class="small ghost">Yenile</button>
        </div>

        <div class="hm-meta">
          <span id="ordersStatus" class="muted"></span>
          <span id="ordersLastUpdated" class="muted">Son güncelleme: -</span>
        </div>
      </div>

      <div class="hm-table-wrap" id="ordersTableWrap">
        <table class="hm-table">
          <thead>
          <tr>
            <th>Tarih</th>
            <th>Sipariş Kodu</th>
            <th>Telefon</th>
            <th>Toplam</th>
            <th>Ödeme</th>
            <th>Durum</th>
            <th>Ürün Adedi</th>
            <th>İşlemler</th>
          </tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>

      <div id="ordersCardList" class="hm-mobile-list"></div>

      <div class="hm-footer">
        <span id="ordersPaginationInfo" class="muted"></span>
        <div class="pagination-controls">
          <button type="button" id="prevPageButton" class="small ghost">Önceki</button>
          <span id="currentPageText">Sayfa 1</span>
          <button type="button" id="nextPageButton" class="small ghost">Sonraki</button>
        </div>
      </div>
    </div>

    <dialog id="orderDetailDialog" class="order-dialog hm-dialog">
      <div class="order-dialog-header">
        <h3>Sipariş Detayı</h3>
        <button type="button" id="closeDetailButton" class="small ghost">İptal</button>
      </div>
      <div id="orderDetailContent"></div>
    </dialog>
  </section>
</main>
<script src="/public/admin/admin.js"></script>
<script src="/public/admin/orders.js"></script>
</body>
</html>
